<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUPENSION PLUS</title>
  <style>
    :root { --bg:#f3eee7; --panel:#ebe3d8; --text:#314056; --muted:#6f7f95; --accent:#6d8cff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .wrap { padding:24px 12px 40px; }
    .hero-copy { width:min(60%, 760px); margin:0 auto 18px; text-align:center; }
    .hero-copy h1 { margin:0; font-size:2rem; letter-spacing:-0.04em; }
    .hero-copy h2 { margin:8px 0 0; color:var(--accent); font-size:1.05rem; }
    .hero-copy p { margin:14px 0 0; color:var(--muted); line-height:1.75; }
    .media-stack { width:min(60%, 760px); margin:0 auto; display:flex; flex-direction:column; gap:0; overflow:hidden; border-radius:22px; }
    .media-item { display:block; line-height:0; }
    .media-image, .media-frame, .media-link { width:100%; display:block; border:0; border-radius:0; }
    .media-image { height:auto; object-fit:cover; }
    .media-frame { aspect-ratio:9 / 16; min-height:420px; background:#111; }
    .media-link { padding:18px; text-align:center; text-decoration:none; color:var(--accent); background:rgba(255,255,255,0.38); font-weight:700; line-height:1.4; }
    .empty-block { width:min(60%, 760px); margin:0 auto; text-align:center; padding:22px; color:var(--muted); background:rgba(255,255,255,0.3); border-radius:18px; }
    @media (max-width:720px) { .wrap { padding:18px 0 28px; } .hero-copy, .media-stack, .empty-block { width:100%; } .media-frame { min-height:340px; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero-copy">
      <h1>SUPENSION PLUS</h1>
      <h2>Expertos en Liquidacion e Pensiones</h2>
      <p>xxxxxxxxxxxxxxxxxxxx  xxxxxxxxxxxxxxxxxxx ccccccccccc</p>
    </div>
    <div class="media-stack"><div class="media-item"><img class="media-image" src="https://i.ibb.co/KzFzMvXP/00.png" alt="Bloque visual"></div><div class="media-item"><img class="media-image" src="https://i.ibb.co/n8sGzDgQ/01.png" alt="Bloque visual"></div><div class="media-item"><img class="media-image" src="https://i.ibb.co/XfwjCVbW/02.png" alt="Bloque visual"></div><div class="media-item"><img class="media-image" src="https://i.ibb.co/FLp4MzJJ/03.png" alt="Bloque visual"></div><div class="media-item"><img class="media-image" src="https://i.ibb.co/0pB5L29F/04.png" alt="Bloque visual"></div></div>
  </div>
</body>
</html>
